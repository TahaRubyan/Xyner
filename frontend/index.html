<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XYNER | The Cafe You Love</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.getElementById('runtime-error-overlay');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'runtime-error-overlay';
          errDiv.style.position = 'fixed';
          errDiv.style.top = '0';
          errDiv.style.left = '0';
          errDiv.style.width = '100%';
          errDiv.style.zIndex = '999999';
          errDiv.style.background = '#feebec';
          errDiv.style.color = '#761c19';
          errDiv.style.border = '1px solid #ebccd1';
          errDiv.style.padding = '15px';
          errDiv.style.fontFamily = 'monospace';
          errDiv.style.fontSize = '14px';
          errDiv.style.whiteSpace = 'pre-wrap';
          document.body.appendChild(errDiv);
        }
        errDiv.textContent += '\nError: ' + e.message + '\nAt: ' + e.filename + ':' + e.lineno + '\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.getElementById('runtime-error-overlay');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'runtime-error-overlay';
          errDiv.style.position = 'fixed';
          errDiv.style.top = '0';
          errDiv.style.left = '0';
          errDiv.style.width = '100%';
          errDiv.style.zIndex = '999999';
          errDiv.style.background = '#feebec';
          errDiv.style.color = '#761c19';
          errDiv.style.border = '1px solid #ebccd1';
          errDiv.style.padding = '15px';
          errDiv.style.fontFamily = 'monospace';
          errDiv.style.fontSize = '14px';
          errDiv.style.whiteSpace = 'pre-wrap';
          document.body.appendChild(errDiv);
        }
        errDiv.textContent += '\nUnhandled Rejection: ' + (e.reason ? e.reason.message || e.reason : e) + '\n';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
